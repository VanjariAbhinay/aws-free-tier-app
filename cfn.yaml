AWSTemplateFormatVersion: '2010-09-09'
Description: Production-like App on AWS Free Tier
Parameters:
  KeyName: { Type: 'AWS::EC2::KeyPair::KeyName', Description: 'EC2 KeyPair' }
  GitHubRepoUrl: { Type: String, Description: 'GitHub Repo URL' }
Resources:
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement: [{ Effect: 'Allow', Principal: { Service: 'ec2.amazonaws.com' }, Action: 'sts:AssumeRole' }]
      ManagedPolicyArns: 
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: S3LeastPrivilege
          PolicyDocument:
            Version: '2012-10-17'
            Statement: [{ Effect: 'Allow', Action: ['s3:PutObject', 's3:GetObject'], Resource: !Sub 'arn:aws:s3:::${S3Bucket}/*' }]
  EC2Profile:
    Type: AWS::IAM::InstanceProfile
    Properties: { Roles: [!Ref EC2Role] }
  WebSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP/HTTPS/SSH
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 80, ToPort: 80, CidrIp: 0.0.0.0/0 }
        - { IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: 0.0.0.0/0 }
        - { IpProtocol: tcp, FromPort: 22, ToPort: 22, CidrIp: 0.0.0.0/0 } # Restrict to your IP in prod!
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption: { ServerSideEncryptionConfiguration: [{ ServerSideEncryptionByDefault: { SSEAlgorithm: 'AES256' } }] }
  WebServer:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      KeyName: !Ref KeyName
      SecurityGroups: [!Ref WebSG]
      IamInstanceProfile: !Ref EC2Profile
      ImageId: ami-0c55b159cbfafe1f0 # Amazon Linux 2 (us-east-1). Change if in another region.
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y && yum install -y amazon-cloudwatch-agent git
          curl -fsSL https://rpm.nodesource.com/setup_18.x | bash - && yum install -y nodejs
          cd /opt && git clone ${GitHubRepoUrl} app && cd app && npm install
          cat <<EOF > /etc/systemd/system/myapp.service
          [Unit]
          Description=Node App
          After=network.target
          [Service]
          ExecStart=/usr/bin/node /opt/app/app.js
          Restart=always
          User=root
          Environment=PORT=80
          [Install]
          WantedBy=multi-user.target
          EOF
          systemctl daemon-reload && systemctl enable myapp && systemctl start myapp
          cat <<EOF > /opt/cw-agent.json
          {
            "agent": {"metrics_collection_interval": 60},
            "metrics": { "namespace": "MyApp", "metrics_collected": { "cpu": {"measurement": ["cpu_usage_idle"]}, "mem": {"measurement": ["mem_used_percent"]} } },
            "logs": { "logs_collected": { "files": { "collect_list": [{ "file_path": "/var/log/messages", "log_group_name": "/myapp/sys", "log_stream_name": "{instance_id}" }] } } }
          }
          EOF
          /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -s -c file:/opt/cw-agent.json
Outputs:
  EC2PublicIP: { Value: !GetAtt WebServer.PublicIp }
  S3BucketName: { Value: !Ref S3Bucket }
